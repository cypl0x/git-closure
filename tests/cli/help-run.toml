bin.name = "git-closure"
args = ["run", "--help"]
status = "success"
stdout = """
Execute a recipe file (routes through the provenance-light compile path)

Usage: git-closure run <RECIPE>

Arguments:
  <RECIPE>  Recipe file (.toml)

Options:
  -h, --help  Print help

PROVENANCE: behavior depends on recipe mode. mode = "compile" (default) uses the provenance-light compile path — no git metadata is injected. mode = "build" uses the git-aware build path and records git metadata where available (gcl only). See `build` for the direct build command.
"""
